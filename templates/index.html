{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Listado de Citas</h1>
    <a href="/agendar" class="btn btn-success">Nueva Cita</a>
</div>

<div class="row">
    {% for item in consulta %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm h-100">
            <div class="card-body">
                <h5 class="card-title text-primary">{{ item.mascota }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ item.especie }}</h6>
                <hr>
                <p class="card-text">
                    <strong>Propietario:</strong> {{ item.propietario }} <br>
                    <strong>Fecha:</strong> {{ item.fecha }}
                </p>
            </div>
            <div class="card-footer bg-transparent border-top-0 d-flex justify-content-between">
                <a href="/modificar/{{ item.id }}" class="btn btn-outline-primary btn-sm">Editar</a>
                <a href="/cancelar/{{ item.id }}" class="btn btn-outline-danger btn-sm" onclick="return (confirm('¿Esta seguro de eliminar el registro?'))">Cancelar Cita</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center">
        <p class="text-muted">No hay citas registradas.</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
